<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wohnung" />
  <meta name="theme-color" content="#0a0f0d" />
  <title>Wohnung öffnen</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@300;400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f0d; --green: #4ade80; --green-dim: #22c55e;
      --cream: #e8ede6; --muted: #4a5e50; --error: #f87171;
    }
    html, body { height: 100%; width: 100%; overflow: hidden; background: var(--bg);
      font-family: 'Jost', sans-serif; color: var(--cream);
      -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    body { display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 100dvh; }
    .backdrop { position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 100%, rgba(74,222,128,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 20% 20%, rgba(74,222,128,0.03) 0%, transparent 60%); }
    .backdrop::after { content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size: 256px; pointer-events: none; }
    .wrap { position: relative; z-index: 1; display: flex; flex-direction: column;
      align-items: center; padding: 0 40px; width: 100%; }
    .eyebrow { font-weight: 200; font-size: 10px; letter-spacing: 0.5em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
      opacity: 0; animation: rise 0.9s ease 0.1s forwards; }
    h1 { font-family: 'Playfair Display', serif; font-weight: 300;
      font-size: clamp(42px, 11vw, 64px); line-height: 1.05; text-align: center;
      color: var(--cream); margin-bottom: 56px; opacity: 0; animation: rise 0.9s ease 0.25s forwards; }
    .btn-wrap { position: relative; opacity: 0; animation: rise 0.9s ease 0.45s forwards; }
    .ring-orbit { position: absolute; inset: -22px; border-radius: 50%;
      border: 1px dashed rgba(74,222,128,0.13); animation: orbit 18s linear infinite; pointer-events: none; }
    .ring-orbit::before { content: ''; position: absolute; top: -4px; left: 50%;
      transform: translateX(-50%); width: 7px; height: 7px; border-radius: 50%;
      background: var(--green-dim); opacity: 0.5; }
    .btn { position: relative; width: min(248px, 70vw); aspect-ratio: 1; border-radius: 50%;
      border: 1px solid rgba(74,222,128,0.2); cursor: pointer; outline: none; -webkit-appearance: none;
      background: radial-gradient(circle at 40% 35%, #182820, #0d1510);
      box-shadow: 0 24px 64px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      transition: transform 0.12s ease, box-shadow 0.35s ease, border-color 0.35s ease; }
    .btn:hover { border-color: rgba(74,222,128,0.38);
      box-shadow: 0 0 48px rgba(74,222,128,0.13), 0 24px 64px rgba(0,0,0,0.7); }
    .btn:active { transform: scale(0.93); }
    .icon-wrap { transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    .btn:hover .icon-wrap { transform: translateY(-3px) scale(1.08); }
    .lock-icon { width: 54px; height: 54px; color: var(--green); transition: color 0.3s ease; }
    .btn-label { font-weight: 200; font-size: 10px; letter-spacing: 0.45em;
      text-transform: uppercase; color: var(--green-dim); opacity: 0.75; transition: all 0.3s ease; }
    .btn.loading { pointer-events: none; }
    .btn.loading .icon-wrap { animation: pulse-scale 0.9s ease infinite; }
    .btn.loading .btn-label { opacity: 0.35; letter-spacing: 0.65em; }
    .btn.success { border-color: rgba(74,222,128,0.55); pointer-events: none;
      box-shadow: 0 0 70px rgba(74,222,128,0.22), 0 24px 64px rgba(0,0,0,0.7);
      animation: success-burst 0.7s ease forwards; }
    .btn.success .btn-label { color: var(--green); opacity: 1; letter-spacing: 0.5em; }
    .btn.error { border-color: rgba(248,113,113,0.4); pointer-events: none;
      box-shadow: 0 0 40px rgba(248,113,113,0.1), 0 24px 64px rgba(0,0,0,0.7); }
    .btn.error .lock-icon { color: var(--error); }
    .btn.error .btn-label { color: var(--error); opacity: 0.85; }
    .footer-text { margin-top: 50px; font-size: 11px; font-weight: 300; letter-spacing: 0.22em;
      color: var(--muted); opacity: 0; animation: rise 0.9s ease 0.65s forwards; }
    @keyframes rise { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes orbit { to { transform: rotate(360deg); } }
    @keyframes pulse-scale { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(0.86); opacity:0.5; } }
    @keyframes success-burst {
      0%   { box-shadow: 0 0 0 0 rgba(74,222,128,0.5), 0 24px 64px rgba(0,0,0,0.7); }
      60%  { box-shadow: 0 0 0 28px rgba(74,222,128,0), 0 24px 64px rgba(0,0,0,0.7); }
      100% { box-shadow: 0 0 70px rgba(74,222,128,0.22), 0 24px 64px rgba(0,0,0,0.7); } }
  </style>
</head>
<body>
<div class="backdrop"></div>
<div class="wrap">
  <p class="eyebrow">Napoli · Appartamento</p>
  <h1>Wohnung<br>öffnen</h1>
  <div class="btn-wrap">
    <div class="ring-orbit"></div>
    <button class="btn" id="btn" onclick="openDoor()" aria-label="Wohnungstür öffnen">
      <div class="icon-wrap">
        <svg class="lock-icon" id="lockIcon" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
        </svg>
      </div>
      <span class="btn-label" id="btnLabel">Tippen</span>
    </button>
  </div>
  <p class="footer-text">Porta Appartamento</p>
</div>
<script>
  const TOKEN     = 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpYXQiOjE3NzQ4MDUyMDIsIm5iZiI6MTc3NDgwNTIwMiwianRpIjoiMTQ4MDA2ODYtOTVmNC00YTk0LTg1YjctZDBmMGFhNzRmZTJmIiwiZXhwIjoxODA2MzQxMjAyLCJpZGVudGl0eSI6ImY3NmU3MmRjLTg3ZGMtNDQ0NC04OGNmLWU2NTRkYjg0MjJhMSIsImZyZXNoIjpmYWxzZSwidHlwZSI6ImFjY2VzcyIsInVzZXJfY2xhaW1zIjp7Im5zX2lkIjpudWxsLCJyb2xlIjoiUkVTViIsImNyZWF0ZWRfZGF0ZSI6bnVsbCwiYWRtaW5fdXNlcl9rZXkiOm51bGwsInNjb3BlIjpudWxsfX0.8EDPWE7-3Jhck_tpXXBjuFjEDo1y8eMros6enyhCUL8';
  const LOCAL_KEY = 'DS1VrlpjkszOfmKZA7039UTq00000000';
  const TOOL_KEY  = 'DS1VrlpjkszOfmKZA7039UTqOHSM0000';
  const RESV_KEY  = 'HMPW3Y9P';

  const btn = document.getElementById('btn');
  const btnLabel = document.getElementById('btnLabel');
  const lockIcon = document.getElementById('lockIcon');
  let busy = false;

  async function openDoor() {
    if (busy) return;
    busy = true;
    btn.classList.add('loading');
    btnLabel.textContent = 'Öffne\u2026';
    try {
      const res = await fetch('https://api.vikey.it/api/v3/local/cmd', {
        method: 'POST',
        headers: {
          'Accept': 'application/json, text/plain, */*',
          'Authorization': 'Bearer ' + TOKEN,
          'Content-Type': 'application/json',
          'Origin': 'https://guest.vikey.it',
          'Referer': 'https://guest.vikey.it/',
        },
        body: JSON.stringify({ token: TOKEN, top: 'TOGGLE', local_key: LOCAL_KEY, tool_key: TOOL_KEY, resv_key: RESV_KEY }),
      });
      const data = await res.json();
      if (data?.data?.return_code === true) {
        showSuccess();
      } else {
        showError('Fehler');
      }
    } catch (e) {
      btn.classList.remove('loading');
      btn.classList.add('error');
      btnLabel.textContent = 'Weiterleiten\u2026';
      setTimeout(() => { window.location.href = 'https://guest.vikey.it/reservations/' + RESV_KEY; }, 900);
    }
  }

  function showSuccess() {
    btn.classList.remove('loading');
    btn.classList.add('success');
    lockIcon.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0"/>';
    btnLabel.textContent = 'Offen \u2713';
    setTimeout(reset, 5000);
  }

  function showError(msg) {
    btn.classList.remove('loading');
    btn.classList.add('error');
    btnLabel.textContent = msg;
    setTimeout(reset, 3000);
  }

  function reset() {
    busy = false;
    btn.classList.remove('loading', 'success', 'error');
    lockIcon.innerHTML = '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>';
    btnLabel.textContent = 'Tippen';
  }
</script>
</body>
</html>
